<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamepad Inspector - Download</title>
    <style>
        body { 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0;
            background-color: #0e0e0e; 
            color: #ffffff; 
        }
        .container {
            text-align: center;
            padding: 40px;
            border: 1px solid #333;
            border-radius: 10px;
            background-color: #1a1a1a;
        }
        h1 { margin-bottom: 10px; font-size: 24px; }
        p { color: #888; margin-bottom: 30px; }
        .manual-link { 
            color: #0078d4; 
            text-decoration: none; 
            font-size: 14px;
            border-bottom: 1px solid transparent;
        }
        .manual-link:hover {
            border-bottom: 1px solid #0078d4;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gamepad Inspector</h1>
        <p>ダウンロードが開始されました。</p>
        <a href="Gamepad Inspector.zip" id="download-trigger" class="manual-link">自動で開始されない場合はこちらをクリックしてください</a>
    </div>

    <script>
        (function() {
            var link = document.getElementById('download-trigger');
            link.click();
        })();
    </script>
</body>
</html>
